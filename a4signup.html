<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>
body { font-family:Arial; text-align:center; margin-top:50px; }
input { padding:8px; width:250px; }
</style>

</head>
<body>

<h2>Sign Up</h2>

<form id="signupForm">
<input type="text" name="fullname" placeholder="Full Name" required><br><br>
<input type="email" name="email" placeholder="Email" required><br><br>
<input type="text" name="username" placeholder="Username" required><br><br>
<input type="password" name="password" placeholder="Password" required><br><br>
<input type="password" name="confirm" placeholder="Confirm Password" required><br><br>

<input type="submit" value="Create Account">
</form>

<script>
document.getElementById("signupForm").addEventListener("submit",function(e){
    e.preventDefault();

    let u=document.querySelector('[name="username"]').value;
    let p=document.querySelector('[name="password"]').value;
    let c=document.querySelector('[name="confirm"]').value;

    if(p!==c){ alert("Passwords not match"); return; }

    localStorage.setItem("username",u);
    localStorage.setItem("password",p);

    alert("Signup done");
    window.location.href="a4login.html";
});
</script>

</body>
</html>
